services:
  db:
    image: postgres:15
    container_name: kontrolling-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controlling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kontrolling-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/controlling
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      PROJECT_NAME: Controlling API
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m app.scripts.seed_db || true &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:

networks:
  default:
    name: kontrolling-network
